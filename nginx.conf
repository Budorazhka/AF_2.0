server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # ---- gzip ----
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/xml image/svg+xml font/ttf font/otf
        application/font-woff application/font-woff2;

    # ---- SSI (shared header/footer partials) ----
    ssi on;

    # ---- routing: pretty URLs (/architecture -> architecture.html) ----
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ $uri.html /index.html;
    }

    # партиалы напрямую не отдаём как страницы
    location /partials/ {
        internal;
    }

    # ---- fonts: long immutable cache ----
    location ~* \.(?:woff2?|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ---- css/js: revalidate so updates show immediately (ETag) ----
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~* \.(?:mp4|webm|ogg|mov)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # html — always fresh
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # ---- security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # don't serve dotfiles
    location ~ /\. { deny all; }
}
