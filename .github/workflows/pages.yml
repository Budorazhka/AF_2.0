name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Подставляет partials/top.html и partials/bottom.html вместо SSI-инклюдов
      # (GitHub Pages не умеет их обрабатывать, в отличие от nginx в проде).
      # SITE_BASE_PATH = "/<имя репозитория>" — project-сайт GitHub Pages живёт
      # в подпапке (https://user.github.io/AF_2.0/), а не в корне домена.
      - name: Build static site
        env:
          SITE_BASE_PATH: /${{ github.event.repository.name }}
        run: python scripts/build_pages.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
